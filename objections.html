<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hometown UC — Objection Handler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#D01A38;--red-light:#FDEAED;--red-dark:#A01228;
  --charcoal:#4a4949;--charcoal-dark:#333232;
  --gray-50:#F9F8F6;--gray-100:#F1EFE8;--gray-200:#E0DED6;
  --text:#1C1B18;--text-soft:#5F5E5A;--text-muted:#9A9890;
  --border:#E0DED6;--white:#FFFFFF;
  --radius:10px;--radius-lg:14px;
}
body{font-family:"DM Sans",sans-serif;background:var(--gray-50);color:var(--text);min-height:100vh;line-height:1.6}

/* HEADER */
.site-header{background:var(--white);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:96px;gap:16px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-text{display:flex;flex-direction:column;line-height:1.2}
.logo-text .line1{font-size:16px;font-weight:600;color:var(--text)}
.logo-text .line2{font-size:13px;font-weight:500;color:var(--red)}
.back-btn{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--text-soft);cursor:pointer;text-decoration:none;transition:all 0.15s;white-space:nowrap}
.back-btn:hover{border-color:var(--charcoal);color:var(--charcoal)}

/* LAYOUT */
.main{max-width:960px;margin:0 auto;padding:2.5rem 2rem 4rem}
.page-title{font-family:"DM Serif Display",serif;font-size:28px;margin-bottom:4px}
.page-subtitle{font-size:14px;color:var(--text-soft);margin-bottom:1.5rem}

/* MIYAGI BANNER */
.miyagi-banner{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;flex-wrap:wrap}
.miyagi-step-pill{display:flex;align-items:center;gap:8px;font-size:13px}
.miyagi-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.dot-agree{background:#EAF3DE;color:#27500A}
.dot-incentivize{background:#FFF8E7;color:#8B6000}
.dot-testdrive{background:#E6F1FB;color:#185FA5}
.dot-email{background:var(--gray-100);color:var(--charcoal)}
.miyagi-step-text{color:var(--text-soft);font-size:12px}
.miyagi-step-text strong{color:var(--text);font-weight:600}

/* FILTERS */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.ctx-pill{font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--text-soft);cursor:pointer;transition:all 0.15s}
.ctx-pill:hover{border-color:var(--charcoal);color:var(--charcoal)}
.ctx-pill.active{background:var(--charcoal);color:white;border-color:var(--charcoal)}
.cat-pill{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--text-soft);cursor:pointer;transition:all 0.15s}
.cat-pill:hover{border-color:var(--red);color:var(--red)}
.cat-pill.active{background:var(--red-light);color:var(--red);border-color:var(--red)}
.obj-search{font-family:"DM Sans",sans-serif;font-size:14px;padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius);outline:none;width:100%;background:var(--white);color:var(--text);margin-bottom:1rem}
.obj-search:focus{border-color:var(--red)}

/* CATEGORY EXPLAINER */
.cat-explainer{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.5rem;margin-bottom:1rem;display:none}
.cat-explainer.visible{display:block}
.cat-explainer-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-right:8px}
.cat-explainer-text{font-size:13px;color:var(--text-soft);line-height:1.65;margin-top:6px}

/* OBJECTION LIST */
.obj-list{display:flex;flex-direction:column;gap:8px}
.obj-item{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color 0.15s}
.obj-item:hover{border-color:var(--gray-200)}
.obj-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.obj-header:hover{background:var(--gray-50)}
.cat-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.cat-badge.pre-pitch{background:#E6F1FB;color:#185FA5}
.cat-badge.dismissive{background:#FAEEDA;color:#854F0B}
.cat-badge.situational{background:#EAF3DE;color:#3B6D11}
.cat-badge.existing{background:var(--red-light);color:var(--red)}
.cat-badge.email-reply{background:var(--gray-100);color:var(--charcoal)}
.obj-text{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.obj-chevron{color:var(--text-muted);font-size:12px;transition:transform 0.2s;flex-shrink:0}
.obj-item.open .obj-chevron{transform:rotate(180deg)}
.obj-body{display:none;border-top:1px solid var(--border)}
.obj-item.open .obj-body{display:block}

/* MIYAGI STEPS */
.step-block{padding:16px;border-bottom:1px solid var(--border)}
.step-block:last-of-type{border-bottom:none}
.step-label-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.step-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;padding:2px 8px;border-radius:6px}
.step-agree .step-label{background:#EAF3DE;color:#27500A}
.step-incentivize .step-label{background:#FFF8E7;color:#8B6000}
.step-testdrive .step-label,.step-testdrive2 .step-label{background:#E6F1FB;color:#185FA5}
.step-email .step-label,.step-strategy .step-label{background:var(--gray-100);color:var(--charcoal)}
.step-say{font-size:14px;color:var(--text);line-height:1.75;padding:10px 14px;background:var(--gray-50);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--border)}
.step-agree .step-say{border-left-color:#639922}
.step-incentivize .step-say{border-left-color:#EF9F27}
.step-testdrive .step-say,.step-testdrive2 .step-say{border-left-color:#378ADD}
.step-email .step-say,.step-strategy .step-say{border-left-color:var(--charcoal)}
.why-btn{font-family:"DM Sans",sans-serif;font-size:12px;color:var(--text-muted);cursor:pointer;border:1px solid var(--border);background:var(--white);border-radius:6px;padding:3px 9px;transition:all 0.15s;display:inline-flex;align-items:center;gap:4px}
.why-btn:hover{border-color:var(--red);color:var(--red)}
.why-panel{display:none;margin-top:8px;padding:10px 14px;background:#FFF8E7;border-radius:8px;border-left:3px solid #EF9F27;font-size:13px;color:#5F5E5A;line-height:1.65}
.why-panel.open{display:block}
.why-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#8B6000;margin-bottom:4px}

/* COPY ROW */
.copy-row{padding:10px 16px;background:var(--gray-50);border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.copy-script-btn{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--text-soft);cursor:pointer;transition:all 0.15s}
.copy-script-btn:hover{border-color:var(--red);color:var(--red)}
.copy-script-btn.copied{background:#EAF3DE;border-color:#3B6D11;color:#3B6D11}

.no-results{text-align:center;padding:3rem;color:var(--text-muted);font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#2C2C2A;color:white;font-size:13px;padding:10px 16px;border-radius:8px;z-index:300;opacity:0;transform:translateY(8px);transition:all 0.25s;pointer-events:none;max-width:320px}
.toast.show{opacity:1;transform:none}
.toast.success{background:#27500A}

@media(max-width:640px){
  .main{padding:1.5rem 1rem 3rem}
  .miyagi-banner{gap:1rem}
  .header-inner{height:72px}
  .logo-text .line1{font-size:14px}
}
</style>
</head>

    <button class="ctx-pill" id="ctx-email" onclick="setCtx('email')">Email Reply</button>
  </div>

  <!-- CATEGORY EXPLAINER -->
  <div class="cat-explainer" id="catExplainer">
    <div id="catExplainerHead"></div>
    <div class="cat-explainer-text" id="catExplainerText"></div>
  </div>

  <!-- CATEGORY FILTER -->
  <div class="filter-row" id="catRow">
    <button class="cat-pill active" data-cat="all" onclick="setCat('all',this)">All</button>
    <button class="cat-pill" data-cat="pre-pitch" onclick="setCat('pre-pitch',this)">Pre-Pitch</button>
    <button class="cat-pill" data-cat="dismissive" onclick="setCat('dismissive',this)">Dismissive</button>
    <button class="cat-pill" data-cat="situational" onclick="setCat('situational',this)">Situational</button>
    <button class="cat-pill" data-cat="existing" onclick="setCat('existing',this)">Existing Solution</button>
  </div>

  <input class="obj-search" id="objSearch" type="text" placeholder="Search objections…" oninput="render()"/>
  <div class="obj-list" id="objList"></div>
</main>

<div class="toast" id="toast"></div>

<script>
var ctx = "conversation";
var cat = "all";

var catInfo = {
  "pre-pitch":   { label:"Pre-Pitch Dismissive", cls:"pre-pitch",   text:"These happen before your pitch — the prospect is reacting to the interruption, not your message. Don't push through. Disarm with humor or transparency first, then earn 30 more seconds." },
  "dismissive":  { label:"Dismissive Objection",  cls:"dismissive",  text:"Knee-jerk reactions. The prospect isn't evaluating your offer — they want the interruption to stop. You can't fight emotion with logic. Disarm first, then surface the real objection." },
  "situational": { label:"Situational Objection",  cls:"situational", text:"About their circumstances — budget, timing, bandwidth, approvals. These are real but often temporary. Remove all pressure of buying. Just get them in the car." },
  "existing":    { label:"Existing Solution",       cls:"existing",    text:"They already have a clinic or process. Never attack their current solution — it makes them defensive. Agree with their choice, then use a trap question to surface a gap they haven't connected to their provider." },
  "email-reply": { label:"Email Reply",             cls:"email-reply", text:"Email objections need a different tone than live conversations — shorter, more human, zero pressure. The goal is just to keep the thread alive long enough to earn a real conversation." }
};

var objections = [
  { id:1, ctx:"conversation", cat:"pre-pitch", text:"Is this a cold call!?", steps:[
    { type:"agree",      label:"Agree",            say:"Yes — and it's going so, so badly right now.", why:"You disarm them completely by calling out the elephant in the room. In occ health, prospects are flooded with vendor calls. Being the first to admit the awkwardness signals you're a human, not a script." },
    { type:"incentivize",label:"Incentivize",       say:"Look, every clinic, carrier, and TPA rep in Ohio probably has your number. But I specifically looked at your company before I called. Just so no one from our team interrupts you again — could I tell you the one specific reason I reached out to you?", why:"Specificity is everything in occ health. Saying 'I looked at your company specifically' is a pattern interrupt. 'Just so no one calls again' lowers their defenses by making this sound like the LAST call, not the start of a relationship." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"If it's still not worth 90 more seconds after that, just hang up — I won't take it personally.", why:"The test drive is just getting them to hear one relevant thing about their situation. You're not asking for a meeting. The hang-up offer signals confidence and makes them feel in control." }
  ]},
  { id:2, ctx:"conversation", cat:"pre-pitch", text:"I'm in a meeting!", steps:[
    { type:"agree",      label:"Agree",            say:"Oh shoot! If you want, I can hold while you put me on speaker and publicly apologize to the whole team.", why:"Match the ridiculousness of the objection. If you stammer and apologize, you're just another interruption. Leaning into the humor creates a moment that keeps them on the line." },
    { type:"incentivize",label:"Incentivize",       say:"But honestly, I'd hate to interrupt you twice. Would you rather I send a calendar hold for right after your meeting, or would you rather I tell you the one reason I called now so I don't bug you again?", why:"Give them two options — not 'can I call back later?' which disappears into the void. A calendar hold is better than zero — even if they decline it, you have a paper trail and a reason to follow up." }
  ]},
  { id:3, ctx:"conversation", cat:"pre-pitch", text:"Where did you get my number?", steps:[
    { type:"agree",      label:"Agree",            say:"From a contact database — sounds like I really made your day here. I'd actually be happy to send you a screenshot of your entry if you want to see what's out there on you.", why:"Radical transparency disarms instantly — nobody expects a cold caller to offer to show them their own data file. It resets the entire tone of the call." },
    { type:"incentivize",label:"Incentivize",       say:"Look, I don't love making these calls and I know you don't love getting them. But I actually looked at your company specifically before this one. Just so no one calls you again — could I tell you why I called you specifically, then you can hang up from there?", why:"You're double-incentivizing: making this the last call from you AND signaling this was a targeted call, not a dial list. Both make them feel respected enough to give you 30 more seconds." }
  ]},
  { id:4, ctx:"conversation", cat:"pre-pitch", text:"I thought you were someone else", steps:[
    { type:"agree",      label:"Agree",            say:"Ha — I can change my entire personality and call you back if that helps!", why:"Lean into the awkwardness with humor. If you act awkward, you're a lingering annoyance. If you make them laugh, you've created a moment of connection." },
    { type:"incentivize",label:"Incentivize",       say:"Genuinely, I'd hate to interrupt the call you're waiting for. Could I tell you in 30 seconds why I called you specifically — and if that person calls back, hang up on me instantly. I mean it.", why:"Explicitly giving them permission to hang up if their real call comes removes their fear of missing it. Without that, they won't give you 30 seconds." }
  ]},
  { id:5, ctx:"conversation", cat:"pre-pitch", text:"*Prospect hangs up*", steps:[
    { type:"strategy",   label:"Strategy",          say:"Do NOT call back immediately. Note the exact date, time, and last words they said. Call back one week later.", why:"Calling back immediately confirms you're a telemarketer. Waiting a week and referencing the exact moment shows professionalism — you remember them specifically, not as dial #472." },
    { type:"testdrive2", label:"One Week Later",     say:"[Name] — we spoke on [day] around [time]. You couldn't talk and, honestly, you hung up. I don't take it personally — I'd probably do the same. But I called you specifically for a reason and I prepped for this one. Could I get 60 seconds this time?", why:"Citing the exact date, time, and circumstances recreates the moment they hung up on a real human being. Most people feel a flash of guilt — and that guilt creates an opening." }
  ]},
  { id:6, ctx:"conversation", cat:"dismissive", text:"Not interested", steps:[
    { type:"agree",      label:"Agree",            say:"Fair enough — I guess if you needed a better occupational health setup you would've already reached out to us.", why:"Agreeing hard pulls the rug out from under them. They expected a pitch. Instead you're validating their choice, which forces them to actually think about why they're not interested." },
    { type:"incentivize",label:"Incentivize",       say:"Just so no one from Hometown calls you again — could you be straight with me? Is it that you've got a clinic you're happy with, injuries just aren't a priority right now, or you genuinely just hate cold calls? Option 3 is completely valid.", why:"Multiple choice makes them choose a real answer instead of hiding behind 'not interested.' Each answer tells you exactly where to go next." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"(Once you have the real objection, run the Miyagi method on THAT specific objection.)", why:"There's no test drive yet — that's intentional. You don't have the real objection. Whatever they answer in the incentivize step IS the real objection. Then run the full method on that." }
  ]},
  { id:7, ctx:"conversation", cat:"dismissive", text:"Call me in 6 months", steps:[
    { type:"agree",      label:"Agree",            say:"Totally makes sense — if the timing were right, you would've reached out.", why:"If you push back, they defend the 6-month timeline harder. Agreeing makes them relax enough to tell you the real reason." },
    { type:"incentivize",label:"Incentivize",       say:"Just so I don't sound like a goon when I call back — is there something specific happening in 6 months, or is it more that things are just hectic right now?", why:"Most '6 months' responses are avoidance. But occasionally there IS a real reason — new safety director, contract renewal, budget cycle. If there's a real reason, you want to know." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"I wouldn't push for a decision now either. But the companies that move fastest when timing opens up are usually the ones who've already done a quick look at what's out there. Would 15 minutes now be worth having a benchmark for when you're ready?", why:"The test drive removes all pressure by framing this as information-gathering, not buying. In occ health, most employers have never seen what excellent clinic communication actually looks like." }
  ]},
  { id:8, ctx:"conversation", cat:"dismissive", text:"Just send me some information", steps:[
    { type:"agree",      label:"Agree",            say:"Of course — I'd want to review something first too.", why:"Agreeing validates their request without committing to emailing a generic PDF. It buys you one more sentence." },
    { type:"incentivize",label:"Incentivize",       say:"Just so I don't clutter your inbox — was there something specific you wanted to learn, or more just a general overview?", why:"'Just a general overview' is the dead giveaway this is a brush-off. When they say that, you know they're too polite to say no." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"Honestly, a PDF isn't going to tell you anything relevant to your specific situation — and you'll know in 15 minutes whether this makes sense for your operation. Opposed to a quick call? If it's not a fit, I'll give you 15 back.", why:"The fit depends heavily on geography, injury volume, industry risk profile, and current provider gaps. A brochure can't address any of that. 'I'll give you 15 back' signals you respect their time." }
  ]},
  { id:9, ctx:"conversation", cat:"dismissive", text:"That's not my responsibility / wrong person", steps:[
    { type:"agree",      label:"Agree",            say:"Totally my fault for reaching out to the wrong person. This kind of thing usually sits with HR, Safety, or Operations — I must have gotten it wrong.", why:"Mentioning the three most likely roles serves double duty: if they ARE the right person and were deflecting, they'll correct you. If they're genuinely the wrong person, they'll confirm who is." },
    { type:"incentivize",label:"Incentivize",       say:"Just so I don't bug the wrong person — is this more in your Safety Director's court or HR?", why:"Naming specific titles makes it easy to answer and shows you understand how occ health decisions actually get made." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"Could I ask an unreasonable favor from a complete stranger? I was already planning to reach out to your team — would you mind if I mentioned we spoke when I do?", why:"Once you mention you're reaching out to their colleague anyway, they're more likely to agree — because now their colleague might ask about it. You've created accountability without pressure." }
  ]},
  { id:10, ctx:"conversation", cat:"situational", text:"We don't have the budget for this", steps:[
    { type:"agree",      label:"Agree",            say:"I hear ya — right now it's hard enough to hold onto the budget you have, let alone add something new.", why:"Budget objections in occ health are often real but not permanent. The agreement validates the pain without surrendering the conversation." },
    { type:"incentivize",label:"Incentivize",       say:"Just so no one calls you again on this — is it more that there's truly no budget this cycle, or that any new spend requires you to fight for it every step of the way?", why:"This tells you whether it's a timing issue (new budget opens up) or a value issue (you'd need to build a full ROI case). In occ health, the ROI case is strong — claim duration reduction, overtime savings, and EMR impact are all quantifiable." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"You're probably not making any changes right now — I get it. But the employers who move fastest when budget does free up are the ones who already know what they'd be comparing. Worth a quick look just to have a benchmark?", why:"In occ health, the financial case often doesn't become urgent until a bad claim or audit happens. Getting in front of decision-makers before that moment means you're the known option when they're ready." }
  ]},
  { id:11, ctx:"conversation", cat:"situational", text:"Too expensive / your pricing is too high", steps:[
    { type:"agree",      label:"Agree",            say:"I hear you — we're not the cheapest option in Ohio.", why:"Never defensively justify price on a cold call. Agreeing you're not the cheapest actually builds credibility — cheap clinics in occ health often cost more in poor documentation, delayed RTW, and claim escalation." },
    { type:"incentivize",label:"Incentivize",       say:"Just so I understand — was it the service cost itself, or more that you didn't see enough return in what you were getting?", why:"If it's sticker shock, the conversation is about value. If it's a value issue, the real problem is that nobody showed them how poor injury management shows up in claim costs, EMR increases, and overtime." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"Most employers who tell us that find out later the real cost was buried in claim duration and overtime — not in a line item. I'm not promising we're cheaper. But could I show you how similar companies run the math? Just so you have a benchmark.", why:"Reframing the total cost of occ health — not just the clinic fee — is the most powerful test drive in this space. The goal isn't to change their mind on price today. It's to get them thinking about the math differently." }
  ]},
  { id:12, ctx:"conversation", cat:"situational", text:"We're too busy / no bandwidth right now", steps:[
    { type:"agree",      label:"Agree",            say:"Every HR manager and Safety director I talk to in Ohio says the same thing — it literally never slows down.", why:"Acknowledging that 'busy' never goes away signals you understand their world. You're normalizing it, which paradoxically makes them less defensive." },
    { type:"incentivize",label:"Incentivize",       say:"Is this more of a 'we're in a crunch right now' situation, or more that adding a new vendor relationship feels like a project in itself?", why:"'Crunch right now' is a timing issue. 'New vendor feels like a project' is a switching cost objection. Knowing which it is determines your test drive." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"The companies that actually make progress on this are usually the ones already stretched thin — because that's exactly when a broken injury process is costing the most. Would a 15-minute call be worth it, even just to know what you're leaving on the table?", why:"The busiest operations typically have the most to gain from a streamlined injury management process. Connecting their bandwidth problem to the cost of their current setup is the bridge from 'too busy' to 'worth 15 minutes.'" }
  ]},
  { id:13, ctx:"conversation", cat:"situational", text:"We need to hire someone first / waiting on a new leader", steps:[
    { type:"agree",      label:"Agree",            say:"That makes complete sense — nobody wants to make a vendor decision that gets reversed when a new person walks in.", why:"Validating the logic of waiting prevents defensiveness. It shows you understand internal politics — which is rare for a vendor." },
    { type:"incentivize",label:"Incentivize",       say:"Just so I know the timeline — is the search already underway, or is this more of a 'we don't know who owns this yet' situation?", why:"The answer tells you whether to schedule a follow-up (hire happens soon) or go around them (nobody owns it). In occ health, decisions often stall when there's no clear owner — surfacing that ambiguity can actually be helpful to the prospect." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"I wouldn't push for a decision before they're in seat either. But the new Safety Director or HR leader usually walks in wanting to know what's already been evaluated. Would it be worth a quick conversation so you have something to hand them when they arrive?", why:"You're not asking them to make a decision — you're giving them a gift for the new boss. That's a completely different ask." }
  ]},
  { id:14, ctx:"conversation", cat:"situational", text:"We don't have many injuries / low injury volume", steps:[
    { type:"agree",      label:"Agree",            say:"That's actually a good sign — it usually means your safety program is working.", why:"Praising their safety program earns immediate goodwill. You're speaking their language — safety leaders are proud of their numbers. Starting there creates a peer dynamic instead of a vendor dynamic." },
    { type:"incentivize",label:"Incentivize",       say:"Out of curiosity — is that more because you're in a lower-risk industry, or because you've genuinely dialed in your safety protocols?", why:"Both answers give you useful information and both naturally lead to the conversation about what happens when injuries DO occur." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"The employers we work best with often don't have high injury volumes. It's really about what happens when an injury does occur — whether the process is tight enough that a single incident doesn't balloon into a major claim. Worth knowing what that looks like when it's running right?", why:"The pivot from frequency to severity shifts the frame to where the real risk lives. Low injury volume is actually a great objection to receive." }
  ]},
  { id:15, ctx:"conversation", cat:"situational", text:"Our workers' comp carrier directs where we go", steps:[
    { type:"agree",      label:"Agree",            say:"A lot of employers believe that — it's actually one of the most common misconceptions in Ohio occupational health.", why:"Gently labeling it a 'common misconception' rather than 'you're wrong' positions you as an educator, not a salesperson. That dynamic shift is powerful." },
    { type:"incentivize",label:"Incentivize",       say:"Is it that they require it contractually, or more because that's just how it's always been set up?", why:"Most employers who think their carrier directs care have never actually checked. The distinction matters — contractual direction is different from habit." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"Ohio is actually an employer-directed care state for the first visit — which means you have more control over where employees are treated than you might think. Would it be worth 15 minutes just to understand exactly where your authority starts and stops? Most employers are surprised.", why:"This is a specific, high-value piece of information that most prospects genuinely don't know. Offering to educate them without purchase pressure is the perfect test drive for this objection." }
  ]},
  { id:16, ctx:"conversation", cat:"existing", text:"We already have a clinic we use", steps:[
    { type:"agree",      label:"Agree",            say:"Of course — I'd have been surprised if you didn't.", why:"Never start by challenging their current provider. Agreement signals you're not a threat to the relationship they have — which lowers their guard." },
    { type:"incentivize",label:"Incentivize",       say:"Just so I know if it's even worth a conversation — you must not be dealing with any documentation delays or communication gaps between the clinic and your HR team, right?", why:"Documentation delays and communication gaps are the #1 complaint about occupational health providers. The question is phrased as an assumption they're NOT having this problem — designed to make them correct you if they are." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"That's actually where most employers end up having a conversation with us — not because their clinic is bad, but because the communication and RTW coordination creates friction over time. Could I show you what it looks like when that's running well? Just so you have a benchmark.", why:"The test drive is a benchmark comparison, not a switch pitch. Most employers have never seen what excellent employer communication from a clinic looks like — so they can't miss what they've never had. Showing them the benchmark creates the gap." }
  ]},
  { id:17, ctx:"conversation", cat:"existing", text:"We use OhioHealth / Cleveland Clinic / a hospital system", steps:[
    { type:"agree",      label:"Agree",            say:"OhioHealth is a solid operation — honestly, if you're happy with how it's running, it rarely makes sense to switch.", why:"Never badmouth a respected healthcare brand. Hospital systems have strong reputations and defending your current provider makes prospects feel attacked. Agreement keeps them open." },
    { type:"incentivize",label:"Incentivize",       say:"Just so I know this isn't worth pursuing — that must mean you're getting same-day documentation and clear work restrictions back to your HR team consistently, right?", why:"Hospital-based systems are built for patient care, not employer communication. Same-day documentation and clear work restrictions are exactly where hospital ERs frequently fall short for employers." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"That's the most common thing employers tell us they weren't getting from a hospital-based system — it's built for patient outcomes, not employer workflow. Most employers are genuinely surprised by the difference. Could I show you what employer-focused care looks like? You'll probably stay where you are — but at least you'd know.", why:"Employer-focused clinics like Hometown UC communicate back to HR and Safety with documentation, restrictions, and RTW timelines — something most hospital ERs don't prioritize. This differentiation is clear and defensible." }
  ]},
  { id:18, ctx:"conversation", cat:"existing", text:"We already work with a provider (name unknown)", steps:[
    { type:"agree",      label:"Agree",            say:"Makes sense — I should've assumed you had something in place.", why:"Agreeing prevents defensiveness. You're not challenging their choice — you're just trying to understand the landscape." },
    { type:"incentivize",label:"Incentivize",       say:"Just so I mark this as dead — must be OhioHealth, CareSource, or one of the other regional systems, right?", why:"Multiple choice is critical here. Asking 'who are you using?' feels like an interrogation. Giving them options to react to is far less threatening and much more likely to get you the actual name — which you need to ask the right trap question." },
    { type:"testdrive",  label:"After You Get the Name", say:"Once you have the competitor name, run the full Miyagi method specific to that provider — agree with their choice, ask a trap question about a known gap, then sell the test drive with a benchmark.", why:"The competitor name is the key. Without it, you can't ask the right trap question. With it, you can speak specifically to what that provider typically struggles with in the occ health employer relationship." }
  ]},
  { id:19, ctx:"conversation", cat:"existing", text:"We've been with them for years / we're loyal", steps:[
    { type:"agree",      label:"Agree",            say:"That kind of relationship is genuinely rare — it means they've earned your trust over time.", why:"Loyalty is a real value in occ health — switching providers means retraining supervisors, updating protocols, and managing communication gaps. Acknowledging that loyalty is earned, not arbitrary, shows you understand the weight of the relationship." },
    { type:"incentivize",label:"Incentivize",       say:"Just out of curiosity — what's the one thing you'd want to protect most in that relationship if something ever changed?", why:"This question surfaces what they actually value — which tells you exactly where your competitor is strong and where they might be vulnerable. Whatever they say they'd protect is your roadmap." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"That makes complete sense. If everything's tight — documentation, RTW communication, employer responsiveness — there's probably not a strong reason to change. But would it hurt to spend 15 minutes to find out how you compare? Most of the time, loyalty is well-earned. Occasionally, it's just familiarity.", why:"The final line — 'loyalty vs. familiarity' — plants a thought without pressure. You're introducing the possibility that they might not know what they're missing. That curiosity is enough to earn the meeting." }
  ]},
  { id:20, ctx:"conversation", cat:"existing", text:"We're under contract with our current provider", steps:[
    { type:"agree",      label:"Agree",            say:"Completely understand — a contract is a contract, and making a change mid-term creates more problems than it solves.", why:"Acknowledging the contract constraint removes the fear that you're going to push for a rip-and-replace. In occ health, switching providers mid-contract is genuinely disruptive. Agreeing with this reality builds credibility." },
    { type:"incentivize",label:"Incentivize",       say:"Just so I know the timeline — are you locked in for a while, or is this coming up for renewal in the next year or so?", why:"Renewal within a year means you have a real opportunity on a known timeline. Locked in longer means you plant a seed and stay in touch. Either way you need to know." },
    { type:"testdrive",  label:"Sell the Test Drive", say:"You're definitely not making any moves while you're under contract — I get it. But the employers who switch most smoothly are the ones who've already done their homework. Would it be worth a short conversation now, so when the time comes you already know your options?", why:"Zero pressure because you're explicitly acknowledging they won't act now. You're just asking for an information conversation that pays off later. That's an easy yes — and earns you a qualified prospect with a known timeline." }
  ]},
  { id:21, ctx:"email", cat:"email-reply", text:"Not interested (email reply)", steps:[
    { type:"email", label:"Reply", say:"Fair enough — appreciate the reply. Before I close this out, quick question: is it more that you've got a solid occ health setup already, or that this just isn't a priority right now? Either's fine — just helps me know whether to circle back down the road.", why:"Most 'not interested' email replies are reflexive. A brief, curious follow-up with a binary choice gives them an easy way to respond AND gives you useful information. It also keeps you from being marked as spam — because you responded like a human, not a system." }
  ]},
  { id:22, ctx:"email", cat:"email-reply", text:"Please remove me from your list", steps:[
    { type:"email", label:"Reply", say:"Done — removed right now. Just so I close this out correctly: was it the topic, the timing, or just inbox overload? No wrong answer, and genuinely no hard feelings.", why:"Honor the request immediately and completely — don't negotiate it. But asking one honest question before you close the file occasionally surfaces a real objection or a 'actually, not the right time.' It also leaves them with a positive impression of how you handled it." }
  ]},
  { id:23, ctx:"email", cat:"email-reply", text:"We're all set / taken care of", steps:[
    { type:"email", label:"Reply", say:"Good to hear — sounds like you've got this dialed in. Quick question before I close this out: when was the last time you actually reviewed your return-to-work timelines or documentation process with your current clinic? Most employers who feel 'all set' haven't looked closely in 2-3 years. Worth knowing if that's you.", why:"'We're all set' is almost always familiarity talking, not recent evaluation. The RTW timeline and documentation question is specific enough to land — it's not abstract, it's something they can actually check." }
  ]},
  { id:24, ctx:"email", cat:"email-reply", text:"Send me more information (email brush-off)", steps:[
    { type:"email", label:"Reply", say:"Happy to — but I'll be honest with you: a PDF isn't going to tell you anything relevant to your specific operation. What were you actually hoping to learn? I can be a lot more useful if I know that.", why:"Calling out the PDF as useless disarms the brush-off and positions you as someone who wants to solve their actual problem. The question 'what were you hoping to learn?' is hard to ignore — it's direct, respectful, and collaborative." }
  ]},
  { id:25, ctx:"email", cat:"email-reply", text:"We'll keep you in mind / reach out when we need you", steps:[
    { type:"email", label:"Reply", say:"Appreciate that. Just so I know when to resurface — is there a specific trigger that would make this more urgent for you? A contract renewal, a spike in claims, an OSHA audit? Knowing that helps me reach out at the right moment instead of randomly.", why:"This converts a vague deferral into a specific trigger-based follow-up. In occ health, the triggers are real and knowable — contract renewals, claims trends, audits, safety leadership changes. Surfacing a trigger turns 'we'll keep you in mind' into a qualified future conversation." }
  ]},
  { id:26, ctx:"email", cat:"email-reply", text:"No response — ghosted after initial email", steps:[
    { type:"strategy", label:"Bump Strategy", say:"This is your Touch #2. Do NOT say 'just following up.' Lead with a new angle or a specific industry stat, reference the prior email in one sentence, and close with a single low-pressure question.", why:"Generic follow-up emails have near-zero reply rates. The reframe to a new angle signals you have something worth saying. Strong bump angles for occ health: OSHA recordable rate stats for their industry, Ohio workers' comp claim duration benchmarks, or a specific RTW scenario relevant to their role." }
  ]}
];

function esc(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function setCtx(newCtx) {
  ctx = newCtx;
  document.getElementById("ctx-conversation").classList.toggle("active", newCtx === "conversation");
  document.getElementById("ctx-email").classList.toggle("active", newCtx === "email");
  var prePitchBtn = document.querySelector("[data-cat='pre-pitch']");
  if (prePitchBtn) {
    prePitchBtn.style.display = newCtx === "email" ? "none" : "";
  }
  if (cat === "pre-pitch" && newCtx === "email") {
    cat = "all";
    document.querySelectorAll(".cat-pill").forEach(function(b) { b.classList.remove("active"); });
    document.querySelector("[data-cat='all']").classList.add("active");
  }
  updateExplainer();
  render();
}

function setCat(newCat, btn) {
  cat = newCat;
  document.querySelectorAll(".cat-pill").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  updateExplainer();
  render();
}

function updateExplainer() {
  var el = document.getElementById("catExplainer");
  var headEl = document.getElementById("catExplainerHead");
  var textEl = document.getElementById("catExplainerText");
  if (cat === "all") { el.classList.remove("visible"); return; }
  var info = catInfo[cat];
  if (!info) { el.classList.remove("visible"); return; }
  headEl.innerHTML = "<span class='cat-badge " + info.cls + "'>" + esc(info.label) + "</span>";
  textEl.textContent = info.text;
  el.classList.add("visible");
}

function render() {
  var list = document.getElementById("objList");
  var search = (document.getElementById("objSearch").value || "").toLowerCase();
  var filtered = objections.filter(function(o) {
    var ctxMatch = ctx === "conversation" ? o.ctx === "conversation" : o.ctx === "email";
    var catMatch = cat === "all" || o.cat === cat;
    var searchMatch = !search || o.text.toLowerCase().indexOf(search) >= 0 ||
      o.steps.some(function(s) { return s.say.toLowerCase().indexOf(search) >= 0; });
    return ctxMatch && catMatch && searchMatch;
  });

  if (filtered.length === 0) {
    list.innerHTML = "<div class='no-results'>No objections match. Try a different filter or search term.</div>";
    return;
  }

  list.innerHTML = filtered.map(function(o) {
    var info = catInfo[o.cat] || {};
    var catLabel = info.label || o.cat;
    var stepsHtml = o.steps.map(function(s) {
      return "<div class='step-block step-" + s.type + "'>" +
        "<div class='step-label-row'><span class='step-label'>" + esc(s.label) + "</span></div>" +
        "<div class='step-say'>" + esc(s.say) + "</div>" +
        "<button class='why-btn' onclick='toggleWhy(this)'>? Why this works</button>" +
        "<div class='why-panel'><div class='why-title'>The Rationale</div>" + esc(s.why) + "</div>" +
        "</div>";
    }).join("");
    return "<div class='obj-item' id='obj-" + o.id + "'>" +
      "<div class='obj-header' onclick='toggleObj(" + o.id + ")'>" +
      "<span class='cat-badge " + o.cat + "'>" + esc(catLabel) + "</span>" +
      "<span class='obj-text'>" + esc(o.text) + "</span>" +
      "<span class='obj-chevron'>&#9660;</span></div>" +
      "<div class='obj-body'>" + stepsHtml +
      "<div class='copy-row'><button class='copy-script-btn' onclick='copyScript(" + o.id + ",this)'>Copy full script</button></div>" +
      "</div></div>";
  }).join("");
}

function toggleObj(id) {
  document.getElementById("obj-" + id).classList.toggle("open");
}

function toggleWhy(btn) {
  var panel = btn.nextElementSibling;
  panel.classList.toggle("open");
  btn.textContent = panel.classList.contains("open") ? "▲ Hide rationale" : "? Why this works";
}

function copyScript(id, btn) {
  var o = objections.find(function(x) { return x.id === id; });
  if (!o) return;
  var text = o.steps.map(function(s) { return "[" + s.label.toUpperCase() + "]\n\"" + s.say + "\""; }).join("\n\n");
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = "Copied!";
    btn.className = "copy-script-btn copied";
    setTimeout(function() { btn.textContent = "Copy full script"; btn.className = "copy-script-btn"; }, 2000);
  });
}

function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + (type || "") + " show";
  setTimeout(function() { t.className = "toast"; }, 3000);
}

window.addEventListener("load", function() { window.scrollTo(0,0); });
history.scrollRestoration = "manual";
render();
</script>
</body>
</html>
